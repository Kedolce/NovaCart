<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaCart</title>
  </head>

  <body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-slate-900 shadow">
      <div class="max-w-7xl mx-auto flex justify-between items-center gap-8 px-6 py-4">

        <!-- LEFT -->
        <div class="flex items-center gap-8">
          <button
            id="btnMenu"
            class="text-2xl font-black text-white hover:text-emerald-400 transition-colors cursor-pointer"
          >
            ☰
          </button>

          <h1
            class="text-2xl font-bold text-white tracking-tight cursor-pointer hover:text-emerald-400 transition-colors"
          >
            NovaCart
          </h1>
        </div>

        <!-- SEARCH -->
        <div class="flex-1">
          <label for="search" class="sr-only">Search Product</label>

          <input
            id="search"
            type="text"
            placeholder="Search products..."
            class="w-full rounded-xl px-4 py-2 bg-white outline-none"
          />
        </div>

        <!-- RIGHT -->
        <div class="flex gap-4">

          <button
            id="btnCart"
            class="p-2 rounded-full hover:bg-gray-700 transition-colors cursor-pointer"
          >
            <img
              src="/src/assets/grocery-store.png"
              alt="Cart"
              class="w-6"
            />
          </button>

          <button
            id="btnUser"
            class="p-2 rounded-full hover:bg-gray-700 transition-colors cursor-pointer"
          >
            <img
              src="/src/assets/user.png"
              alt="User"
              class="w-6"
            />
          </button>

        </div>

      </div>
    </header>

    <!-- ================= PRODUCT PAGE ================= -->

    <div
      id="productPage"
      class=" max-w-7xl mx-auto flex"
    >

      <!-- SIDEBAR (NANTI) -->
      <aside
        id="sidebar"
        class="hidden w-64 border-r bg-white min-h-screen"
      >
        Sidebar
      </aside>

      <!-- PRODUCT AREA -->
      <main
        id="productArea"
        class="flex flex-wrap justify-center gap-8 p-6 flex-1"
      ></main>

    </div>

    <!-- ================= CART PAGE ================= -->

    <div
      id="cartPage"
      class="hidden max-w-7xl mx-auto p-6"
    >

      <div class="mb-6 flex items-center justify-between">

        <h2 class="text-3xl font-bold">
          Shopping Cart
        </h2>

        <button
          id="btnBackToShop"
          class="rounded-lg bg-emerald-500 px-4 py-2 text-white hover:bg-emerald-600 cursor-pointer flex justify-center items-center gap-2"
        >
          <img src="/src/assets/left-arrow.png" alt="back" class="w-3"> Back
        </button>

      </div>

      <div
        id="cartArea"
        class=" p-6 flex flex-wrap gap-8"
      >
        <!-- renderCart() -->
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>

  </body>
</html>
